<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Crow</title>
		<script>
			// VS Code globals — must be set before any module loads
			globalThis._VSCODE_FILE_ROOT = window.location.origin + '/src/';
			globalThis._VSCODE_NLS_LANGUAGE = localStorage.getItem('vscode.nls.locale') || 'en';
			globalThis._VSCODE_NLS_MESSAGES = [];

			globalThis.__CROW_TAURI__ = true;
			try {
				const ua = navigator.userAgent || '';
				const plat = navigator.platform || '';
				if (ua.includes('Mac') || plat.includes('Mac')) {
					globalThis.__CROW_ARCH__ = 'arm64';
					try {
						const gl = document.createElement('canvas').getContext('webgl');
						const ext = gl && gl.getExtension('WEBGL_debug_renderer_info');
						const renderer = ext ? gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) : '';
						if (renderer && /Intel/i.test(renderer) && !/Apple/i.test(renderer)) {
							globalThis.__CROW_ARCH__ = 'x64';
						}
					} catch (_) {}
				} else {
					globalThis.__CROW_ARCH__ = 'x64';
				}
			} catch (_) {
				globalThis.__CROW_ARCH__ = 'x64';
			}
			globalThis._VSCODE_PACKAGE_JSON = { version: '1.110.0', name: 'crow' };
			globalThis._VSCODE_PRODUCT_JSON = {
				nameShort: 'Crow',
				nameLong: 'Crow',
				applicationName: 'crow',
				dataFolderName: '.crow',
				urlProtocol: 'crow',
				version: '1.110.0',
				commit: '',
				date: new Date().toISOString(),
				quality: 'stable',
				reportIssueUrl: 'https://github.com/sidenai/crow/issues/new',
				licenseName: 'MIT',
				licenseUrl: 'https://github.com/sidenai/crow/blob/main/LICENSE',
				extensionsGallery: {
					serviceUrl: 'https://marketplace.siden.ai/api/gallery',
					itemUrl: 'https://open-vsx.org/vscode/item',
					resourceUrlTemplate: 'https://open-vsx.org/vscode/unpkg/{publisher}/{name}/{version}/{path}',
					controlUrl: '',
					nlsBaseUrl: 'https://open-vsx.org/vscode/unpkg/{publisher}/{name}/{version}/extension',
					publisherUrl: ''
				}
			};
		</script>
		<script src="/builtin-extensions.js"></script>
		<script type="module" src="/src/main.ts" defer></script>
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
				background-color: #111111;
				color: #c0c0c0;
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Fira Sans', 'Droid Sans',
					'Helvetica Neue', sans-serif;
				font-size: 13px;
			}

			#workbench {
				height: 100%;
				width: 100%;
			}
		</style>
	</head>
	<body aria-label="">
		<div id="workbench"></div>
	</body>
</html>
